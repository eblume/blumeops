apiVersion: 1
datasources:
- access: proxy
  editable: false
  isDefault: true
  name: Prometheus
  orgId: 1
  type: prometheus
  uid: prometheus
  url: http://prometheus.monitoring.svc.cluster.local:9090
- access: proxy
  editable: false
  name: Loki
  orgId: 1
  type: loki
  uid: loki
  url: http://loki.monitoring.svc.cluster.local:3100
  jsonData:
    derivedFields:
    - datasourceUid: tempo
      matcherRegex: '"traceID":"(\w+)"'
      name: TraceID
      url: "$${__value.raw}"
- access: proxy
  editable: false
  name: Tempo
  orgId: 1
  type: tempo
  uid: tempo
  url: http://tempo.monitoring.svc.cluster.local:3200
  jsonData:
    tracesToLogsV2:
      datasourceUid: loki
      filterByTraceID: true
      filterBySpanID: false
    tracesToMetrics:
      datasourceUid: prometheus
      spanStartTimeShift: "-1h"
      spanEndTimeShift: "1h"
      queries:
      - name: Request rate
        query: "sum(rate(traces_spanmetrics_calls_total{$$__tags}[5m]))"
      - name: Error rate
        query: "sum(rate(traces_spanmetrics_calls_total{$$__tags, status_code=\"STATUS_CODE_ERROR\"}[5m]))"
      - name: Duration (p95)
        query: "histogram_quantile(0.95, sum(rate(traces_spanmetrics_duration_seconds_bucket{$$__tags}[5m])) by (le))"
    serviceMap:
      datasourceUid: prometheus
    nodeGraph:
      enabled: true
- access: proxy
  database: teslamate
  editable: false
  jsonData:
    database: teslamate
    connMaxLifetime: 14400
    maxIdleConns: 2
    maxOpenConns: 5
    sslmode: disable
  name: TeslaMate
  orgId: 1
  secureJsonData:
    password: $TESLAMATE_DB_PASSWORD
  type: postgres
  uid: TeslaMate
  url: blumeops-pg-rw.databases.svc.cluster.local:5432
  user: teslamate
