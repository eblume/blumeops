---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ollama
resources:
  - pv-hostpath.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - service-nodeport.yaml
  - ingress-tailscale.yaml

images:
  - name: ollama/ollama
    newTag: "0.17.5"

configMapGenerator:
  - name: ollama-models
    files:
      - models.txt
  - name: ollama-sync-script
    files:
      - sync-models.sh
