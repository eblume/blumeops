apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - statefulset.yaml
  - service.yaml
  - ingress-tailscale.yaml
  - ingress-tailscale-otlp.yaml

images:
  - name: grafana/tempo
    newTag: "2.10.1"

configMapGenerator:
  - name: tempo-config
    files:
      - tempo.yaml
